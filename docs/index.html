    <script>
      // Prevent context menu and text selection - AGGRESSIVE MODE
      (function() {
        var preventAll = function(e) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        };
        
        document.addEventListener('contextmenu', preventAll, true);
        document.addEventListener('selectstart', preventAll, true);
        document.addEventListener('dragstart', preventAll, true);
        document.addEventListener('mousedown', preventAll, true);
        document.addEventListener('mouseup', function(e) {
          if (e.button === 2) preventAll(e);
        }, true);
        document.addEventListener('copy', preventAll, true);
        document.addEventListener('cut', preventAll, true);
        document.addEventListener('paste', preventAll, true);
        document.addEventListener('keydown', function(e) {
          if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'a')) {
            preventAll(e);
          }
        }, true);
        
        // Mobile long-press prevention
        var touchTimeout;
        document.addEventListener('touchstart', function(e) {
          touchTimeout = setTimeout(function() {
            preventAll(e);
          }, 400);
        }, { passive: true });
        document.addEventListener('touchend', function() {
          clearTimeout(touchTimeout);
        }, { passive: true });
        document.addEventListener('touchmove', function() {
          clearTimeout(touchTimeout);
        }, { passive: true });
        
        // Disable selection on all elements periodically
        setInterval(function() {
          if (window.getSelection) {
            window.getSelection().removeAllRanges();
          }
        }, 100);
